# Per-tool frontmatter for skills.
# Key = skill directory name.
# Shared fields at top level; per-tool overrides nested under tool name.

close-task:
  name: "close-task"
  description: "Close a task by committing, pushing, and creating a PR. Use when the user says /close, 'ship it', 'create PR', or wants to wrap up."
  allowed-tools: "run_in_terminal get_changed_files read_file grep_search get_errors"

context-map:
  name: "context-map"
  description: "Analyze the blast radius of a task — map files, dependencies, tests, and risks before implementation. Use when scope is unclear, multiple files are involved, or user says /map or 'analyze impact'."
  allowed-tools: "grep_search semantic_search read_file"
  argument-hint: "[task description or issue reference]"

create-readme:
  name: "create-readme"
  description: "Create a README.md file for a project. Use ONLY when explicitly asked to create a new README."
  allowed-tools: "read_file create_file semantic_search"

git-commit:
  name: "git-commit"
  description: "Stage changes, generate conventional commit messages, and execute git commits. Use when user asks to commit, says /commit, or wants to create a git commit."
  allowed-tools: "run_in_terminal get_changed_files"

generate-docs:
  name: "generate-docs"
  description: "Generate or update documentation — docstrings, README, API docs, inline comments. Use ONLY when explicitly asked."
  allowed-tools: "read_file replace_string_in_file create_file semantic_search"

generate-tests:
  name: "generate-tests"
  description: "Generate or update pytest tests — unit, integration, TDD mode. Use ONLY when explicitly asked."
  allowed-tools: "read_file create_file replace_string_in_file run_in_terminal"

source-task:
  name: "source-task"
  description: "Fetch a task and create a feature branch from a GitHub issue or ad-hoc request. Use when the user says /source or wants to begin work."
  allowed-tools: "run_in_terminal"
  argument-hint: "[GitHub issue number or URL]"

tdd-workflow:
  name: "tdd-workflow"
  description: "Guide through TDD red-green-refactor cycle."
  argument-hint: "[feature or behavior to implement]"

pytest-coverage:
  name: "pytest-coverage"
  description: "Run pytest with coverage, find uncovered lines, and add tests to reach 100%. Use when user asks to increase coverage, check coverage, or get to 100%."
  allowed-tools: "run_in_terminal read_file create_file replace_string_in_file"
  argument-hint: "[module or file to cover]"

ci-cd-review:
  name: "ci-cd-review"
  description: "Review, audit, or design GitHub Actions CI/CD workflows — security, optimization, testing, and deployment. Use when user asks to review a workflow, audit CI/CD, or design a pipeline."
  allowed-tools: "read_file semantic_search"
  argument-hint: "[workflow file or aspect: security|optimization|testing|deployment]"

acquire-codebase-knowledge:
  name: "acquire-codebase-knowledge"
  description: "Map, document, or onboard into an existing codebase. Produces seven docs in docs/codebase/ covering stack, structure, architecture, conventions, integrations, testing, and concerns. Use when the user says 'map this codebase', 'document this architecture', 'onboard me', or 'create codebase docs'."
  allowed-tools: "run_in_terminal read_file create_file semantic_search list_dir"
  argument-hint: "[focus area: stack|structure|architecture|conventions|integrations|testing|concerns]"

verify-rules:
  name: "verify-rules"
  description: "Verify all instruction rules are loaded in the current conversation — returns PASS or FAIL. Use when user says 'verify rules', 'check rules', or 'are rules loaded?'."
  disable-model-invocation: true
  allowed-tools: "list_dir read_file"

verify-skills:
  name: "verify-skills"
  description: "Verify all skills are present on disk and indexed in the current conversation — returns PASS or FAIL. Use when user says 'verify skills', 'check skills', or 'are skills loaded?'."
  disable-model-invocation: true
  allowed-tools: "list_dir read_file"

verify-agents:
  name: "verify-agents"
  description: "Verify all agents are present on disk and indexed in the current conversation — returns PASS or FAIL. Use when user says 'verify agents', 'check agents', or 'are agents loaded?'."
  disable-model-invocation: true
  allowed-tools: "list_dir read_file"

verification-loop:
  name: "verification-loop"
  description: "Run a structured quality-gate pipeline (Build → Type Check → Lint → Tests → Security Scan → Diff Review) and produce a pass/fail report. Use before committing, creating a PR, or when user says 'verify', 'check everything', 'run quality gates', or 'pre-flight'."
  allowed-tools: "run_in_terminal read_file grep_search list_dir"
  argument-hint: "[optional: specific gate to run, e.g. 'tests only']"

search-first:
  name: "search-first"
  description: "Research existing solutions before writing new code — search codebase, GitHub, library docs, package registries, MCP servers, and web. Use when implementing a non-trivial feature, adding a dependency, or exploring prior art. Triggers on 'find a library for', 'is there an MCP for', 'how do others do X', or 'search first'."
  allowed-tools: "run_in_terminal read_file grep_search semantic_search"
  argument-hint: "[topic or feature to research]"

github-issues:
  name: "github-issues"
  description: "Create, update, and manage GitHub issues using MCP tools. Use this skill when users want to create bug reports, feature requests, or task issues, update existing issues, add labels/assignees/milestones, set issue fields (dates, priority, custom fields), set issue types, manage issue workflows, link issues, add dependencies, or track blocked-by/blocking relationships. Triggers on requests like 'create an issue', 'file a bug', 'request a feature', 'update issue X', 'set the priority', 'set the start date', 'link issues', 'add dependency', 'blocked by', 'blocking', or any GitHub issue management task."
  allowed-tools: "run_in_terminal"
  argument-hint: "[issue title, number, or URL]"
